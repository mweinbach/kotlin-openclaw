name: Build & Test

on:
  push:
    branches: [master]
    tags:
      - "v*"
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: app/build/reports/tests/testDebugUnitTest/

  build:
    name: Build Release APK
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode keystore
        run: |
          mkdir -p keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore/release.jks

      - name: Build release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GRADLE_OPTS: -Xmx4g -XX:MaxMetaspaceSize=512m
        run: ./gradlew :app:assembleRelease -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m"

      - name: Verify APK is signed
        run: |
          set -euo pipefail
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "Signed APK not found at $APK_PATH"
            echo "Available files:"
            ls -lah app/build/outputs/apk/release || true
            exit 1
          fi

          SDK_DIR="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "$SDK_DIR" ]; then
            echo "ANDROID_HOME/ANDROID_SDK_ROOT is not set"
            exit 1
          fi

          APKSIGNER="$(find "$SDK_DIR/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found under $SDK_DIR/build-tools"
            exit 1
          fi

          "$APKSIGNER" verify --verbose --print-certs "$APK_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-release
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Publish APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
