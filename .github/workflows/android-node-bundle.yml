name: Android Node Bundle

on:
  push:
    tags:
      - "android-node-bundle-v*"
  workflow_dispatch:
    inputs:
      termux_ref:
        description: "termux-packages branch or tag to build from"
        required: true
        default: "master"
      release_tag:
        description: "Stable GitHub release tag that will host the bundle assets"
        required: true
        default: "toolchain-node-android-arm64"
      corepack_version:
        description: "Pinned corepack version to include in the bundle"
        required: true
        default: "0.34.6"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build Android arm64 Node Bundle
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      TERMUX_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.termux_ref || 'master' }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || 'toolchain-node-android-arm64' }}
      COREPACK_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.corepack_version || '0.34.6' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space for Termux build
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android-sdk /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
          df -h

      - name: Clone termux-packages
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$TERMUX_REF" https://github.com/termux/termux-packages.git tmp/termux-packages

      - name: Patch Termux package name for OpenClaw
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path("tmp/termux-packages/scripts/properties.sh")
          original = 'TERMUX_APP__PACKAGE_NAME="com.termux"'
          replacement = 'TERMUX_APP__PACKAGE_NAME="ai.openclaw.android"'
          text = path.read_text()
          if original not in text:
              raise SystemExit("Could not find TERMUX_APP__PACKAGE_NAME assignment to patch")
          path.write_text(text.replace(original, replacement, 1))
          PY
          grep -n 'TERMUX_APP__PACKAGE_NAME=' tmp/termux-packages/scripts/properties.sh

      - name: Build Termux packages
        working-directory: tmp/termux-packages
        run: |
          set -euo pipefail
          ./scripts/run-docker.sh -d ./build-package.sh -I -C -a aarch64 \
            nodejs npm libc++ openssl c-ares libicu libsqlite zlib ca-certificates resolv-conf

      - name: Package Android Node bundle
        env:
          TERMUX_PACKAGES_DIR: ${{ github.workspace }}/tmp/termux-packages
          OUTPUT_DIR: ${{ github.workspace }}/dist/android-node
          ANDROID_PACKAGE_NAME: ai.openclaw.android
          TARGET_ARCH: aarch64
          COREPACK_VERSION: ${{ env.COREPACK_VERSION }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          ./scripts/build_android_node_bundle.sh
          ls -lah dist/android-node

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-node-bundle
          path: dist/android-node/
          if-no-files-found: error

      - name: Verify GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh --version

      - name: Publish GitHub release assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          ASSET_NAME="$(python3 - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("dist/android-node/openclaw-node-android-arm64.json").read_text())
          print(manifest["assetName"])
          PY
          )"
          SHA256_NAME="${ASSET_NAME}.sha256"
          python3 - <<'PY' > dist/android-node/release-notes.md
          import json
          from pathlib import Path

          manifest = json.loads(Path("dist/android-node/openclaw-node-android-arm64.json").read_text())
          packages = ", ".join(manifest["packages"])
          print("Managed Android Node bundle for kotlin-openclaw.\n")
          print(f"- Android package name: {manifest['androidPackageName']}")
          print(f"- Node version: {manifest['nodeVersion']} ({manifest['nodePackageVersion']})")
          print(f"- Corepack version: {manifest['corepackVersion']}")
          print(f"- Rootfs prefix: {manifest['rootfsPrefix']}")
          print(f"- Runtime packages: {packages}")
          print(f"- Workflow trigger: ${GITHUB_REF_NAME}")
          PY

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "OpenClaw Android Node Bundle (arm64)" \
              --notes-file dist/android-node/release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --title "OpenClaw Android Node Bundle (arm64)" \
              --notes-file dist/android-node/release-notes.md \
              --target "$GITHUB_SHA"
          fi

          gh release upload "$RELEASE_TAG" \
            "dist/android-node/${ASSET_NAME}" \
            "dist/android-node/${SHA256_NAME}" \
            dist/android-node/openclaw-node-android-arm64.json \
            --clobber
